<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SRP test</title>
</head>
<body>
    <div>
        <h1>SRP aPAKE test</h1>
        <div id="register-form">
            <h2>Register user</h2>
            <div>
                <input id="register-username" type="text" placeholder="Enter username">
            </div>
            <div>
                <input id="register-password" type="password" placeholder="Enter password">
            </div>
            <button id="register-button" type="button">Submit</button>
        </div>
        <div id="authenticate-form">
            <h2>Authenticate user</h2>
            <div>
                <input id="authenticate-username" type="text" placeholder="Enter username">
            </div>
            <div>
                <input id="authenticate-password" type="password" placeholder="Enter password">
            </div>
            <button id="authenticate-button" type="button">Submit</button>
        </div>
    </div>

    <script src="static/jsrp.js" defer></script>
    <script src="static/script.js" defer></script>
</body>
</html>
